<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTP Verification</title>
    <!-- Importing Inter font for a modern look -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="37_3_Practice_Day_37_3_.css">
</head>
<body>
    <div class="otp-card">
        <div class="card-header">
            <!-- Professional lock icon -->
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="otp-icon">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
            <h1>Verify Your Account</h1>
            <p class="subtitle">Enter the 6-digit code sent to your email.</p>
        </div>

        <div class="otp-container">
            <input type="text" maxlength="1" class="otp-input" placeholder="·">
            <input type="text" maxlength="1" class="otp-input" placeholder="·">
            <input type="text" maxlength="1" class="otp-input" placeholder="·">
            <input type="text" maxlength="1" class="otp-input" placeholder="·">
            <input type="text" maxlength="1" class="otp-input" placeholder="·">
            <input type="text" maxlength="1" class="otp-input" placeholder="·">
        </div>

        <button id="verify-btn">Verify OTP</button>

        <p class="resend-text">Didn't receive code? <a href="#" class="resend-link">Resend</a></p>
        <p id="massage"></p>
    </div>
</body>
</html>
