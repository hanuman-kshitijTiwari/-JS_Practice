</head>
<body>
    <div class="game-container">
    <h2 id="msg"></h2> 
    <div class="board">
        <button onclick = "move(0,0,this)" ></button>
        <button onclick = "move(0,1,this)"></button>
        <button onclick = "move(0,2,this)"></button>

        <button onclick = "move(1,0,this)"></button>
        <button onclick = "move(1,1,this)"></button>
        <button onclick = "move(1,2,this)"></button>

        <button onclick = "move(2,0,this)"></button>
        <button onclick = "move(2,1,this)"></button>
        <button onclick = "move(2,2,this)"></button>
    </div>
    </div>
